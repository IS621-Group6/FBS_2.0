name: CI Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci || npm install

      - name: Run frontend lint
        run: npm run lint

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci || npm install

      - name: Build frontend
        run: npm run build

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci || npm install

      - name: Run frontend tests
        run: npm test

  frontend-security-audit:
    name: Frontend Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci || npm install

      - name: Audit frontend production dependencies
        run: npm audit --omit=dev --audit-level=high

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci || npm install

      - name: Run backend lint
        run: npm run lint

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci || npm install

      - name: Initialize SQLite database
        run: npm run init-db

      - name: Run backend tests
        run: npm test

  backend-security-audit:
    name: Backend Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci || npm install

      - name: Audit backend production dependencies
        run: npm audit --omit=dev --audit-level=high

  backend-performance:
    name: Backend Performance Smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci || npm install

      - name: Initialize SQLite database
        run: npm run init-db

      - name: Start backend
        run: npm start &
        env:
          PORT: 3001
          RATE_LIMIT_SEARCH: 100000
          RATE_LIMIT_GLOBAL: 100000
          RATE_LIMIT_WINDOW: 60000

      - name: Wait for health endpoint
        run: |
          for i in {1..30}; do
            if node -e "fetch('http://localhost:3001/api/health').then((r)=>process.exit(r.ok ? 0 : 1)).catch(()=>process.exit(1))"; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not become healthy in time"
          exit 1

      - name: Run performance smoke test
        run: npm run perf:smoke
        env:
          PERF_BASE_URL: http://localhost:3001
          PERF_DURATION: 5
          PERF_CONNECTIONS: 10
          PERF_MAX_P99_MS: 2000
          PERF_MIN_AVG_RPS: 20
          PERF_BOOKING_REQUESTS: 12
          PERF_BOOKING_CONCURRENCY: 4
          PERF_BOOKING_MAX_P95_MS: 1000
          PERF_BOOKING_MIN_AVG_RPS: 2